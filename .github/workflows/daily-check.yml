name: Daily faucet check

on:
  schedule:
    # 06:15 UTC daily. Deliberately off the hour — the top of the hour is the
    # busiest slot on GitHub's shared scheduler and gets delayed most.
    - cron: "15 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    # Don't re-run when the only change is this job's own generated output,
    # otherwise the commit below would trigger an endless rebuild loop.
    paths-ignore:
      - "data/status.json"
      - "index.html"
      - "sitemap.xml"
      - "robots.txt"
      - "*-testnet-faucet/**"
      - "down/**"

permissions:
  contents: write

concurrency:
  group: faucet-check
  cancel-in-progress: false

# Pages "Source" is set to "Deploy from a branch" (main), so GitHub's built-in
# builder publishes whatever is committed here. This job therefore CHECKS the
# faucets, BUILDS the static HTML, and COMMITS the result — no separate deploy
# job, which would race the branch builder and sometimes lose.
jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check faucets
        run: python3 scripts/check_faucets.py

      - name: Build static site
        env:
          SITE_URL: https://testnetfaucets.dev
        run: python3 scripts/build_site.py

      - name: Commit status and generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing changed."
          else
            git commit -m "chore: faucet status + rebuild $(date -u +%Y-%m-%d)"
            git push
          fi
