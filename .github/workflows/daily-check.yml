name: Daily faucet check

on:
  schedule:
    # 06:15 UTC daily. Deliberately off the hour — the top of the hour is the
    # busiest slot on GitHub's shared scheduler and gets delayed most.
    - cron: "15 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: faucet-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check faucets
        run: python3 scripts/check_faucets.py

      - name: Commit status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/status.json
          if git diff --staged --quiet; then
            echo "No status change."
          else
            git commit -m "chore: daily faucet status $(date -u +%Y-%m-%d)"
            git push
          fi
